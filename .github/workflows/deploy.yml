name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build then FTP Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify out/ directory exists
        run: |
          if [ ! -d "out" ]; then
            echo "ERROR: out/ not found. Ensure next.config.mjs has output: 'export'"
            exit 1
          fi
          echo "Build output size: $(du -sh out/)"
          ls out/

      - name: Deploy to cPanel via FTPS
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            mirror -R --delete --verbose ./out/ blogs/Blogs/out/
          "

      - name: Deployment complete
        if: success()
        run: |
          echo "Deployed out/ to cPanel blogs/Blogs/out/"
          echo "Live at https://blogs.cyberneurix.com"
